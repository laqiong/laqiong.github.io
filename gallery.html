<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画廊 - laqiong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        header a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }
        header a:hover {
            color: white;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        /* Masonry 瀑布流布局 */
        .gallery {
            column-count: 4;
            column-gap: 20px;
        }
        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .gallery-item .caption {
            padding: 15px;
            font-size: 0.9em;
            color: #666;
        }
        /* 响应式断点 */
        @media (max-width: 1200px) {
            .gallery { column-count: 3; }
        }
        @media (max-width: 768px) {
            .gallery { column-count: 2; column-gap: 15px; }
            .container { padding: 20px 15px; }
            .gallery-item { margin-bottom: 15px; }
        }
        @media (max-width: 480px) {
            .gallery { column-count: 1; }
            header h1 { font-size: 1.5em; }
        }
        /* 图片点击放大 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }
        .lightbox .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2em;
            cursor: pointer;
            opacity: 0.8;
        }
        .lightbox .close:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header>
        <h1>📷 我的画廊</h1>
        <p><a href="index.html">← 返回首页</a></p>
    </header>

    <div class="container">
        <div class="gallery">
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/600?random=1" alt="照片 1">
                <div class="caption">风景摄影</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/300?random=2" alt="照片 2">
                <div class="caption">城市建筑</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/500?random=3" alt="照片 3">
                <div class="caption">自然风光</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/400?random=4" alt="照片 4">
                <div class="caption">街头随拍</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/700?random=5" alt="照片 5">
                <div class="caption">人像摄影</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/350?random=6" alt="照片 6">
                <div class="caption">静物特写</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/450?random=7" alt="照片 7">
                <div class="caption">日落时分</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/550?random=8" alt="照片 8">
                <div class="caption">旅行记录</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/320?random=9" alt="照片 9">
                <div class="caption">生活瞬间</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/480?random=10" alt="照片 10">
                <div class="caption">黑白影像</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/600?random=11" alt="照片 11">
                <div class="caption">植物微距</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/400/380?random=12" alt="照片 12">
                <div class="caption">夜景灯光</div>
            </div>
        </div>
    </div>

    <!-- 图片放大查看 -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        function openLightbox(item) {
            const img = item.querySelector('img');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = img.src;
            lightbox.classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
        // ESC 键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
