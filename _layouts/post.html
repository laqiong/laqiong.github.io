---
layout: default
---
<article class="page-content fade-in">
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>📅 {{ page.date | date: "%Y年%m月%d日" }}</span>
      {% if page.reading_time %}
      <span>⏱ {{ page.reading_time }}</span>
      {% endif %}
    </div>
    {% if page.tags %}
    <div class="post-tags" style="margin-top:12px;">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
  <hr class="divider" style="margin:0 0 32px;">
  <div class="post-content">
    {{ content }}
  </div>
  <hr class="divider">
  <div style="text-align:center;">
    <a href="/blog.html" class="btn btn-secondary">← 返回博客</a>
  </div>
</article>
