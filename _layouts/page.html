---
layout: default
---
<div class="page-content fade-in">
  {% if page.title %}
  <h1 style="font-size:2em;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px;">{{ page.title }}</h1>
  {% endif %}
  {% if page.description %}
  <p style="color:var(--text-secondary);font-size:1.1em;margin-bottom:40px;">{{ page.description }}</p>
  {% endif %}
  {{ content }}
</div>
